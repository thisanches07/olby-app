<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baixar Obly</title>
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="/fonts.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1d4ed8;
      --blue-light: #5896f6;
      --ink: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
    }

    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
    }

    .logo-wrap img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .5rem;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: .9375rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .625rem;
      width: 100%;
      padding: .875rem 1.25rem;
      border-radius: 12px;
      font-family: inherit;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity .15s, transform .1s;
    }

    .btn-store:active { transform: scale(.98); }

    .btn-apple {
      background: var(--ink);
      color: #fff;
      margin-bottom: .75rem;
    }

    .btn-apple:hover { opacity: .88; }

    .btn-google {
      background: var(--bg);
      color: var(--muted);
      border: 1.5px solid var(--border);
      cursor: default;
    }

    .badge-soon {
      display: inline-block;
      background: #fef9c3;
      color: #854d0e;
      font-size: .6875rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: .15em .5em;
      border-radius: 6px;
      margin-left: .25rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .pc-note {
      font-size: .8125rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* state classes toggled by JS */
    .state-ios    .section-android,
    .state-ios    .section-pc      { display: none; }
    .state-android .section-ios,
    .state-android .section-pc     { display: none; }
    .state-pc     .section-ios,
    .state-pc     .section-android { display: none; }

    /* default: show all (no-JS fallback) */
    .section-ios, .section-android, .section-pc { display: block; }

    .section-pc .h1-pc { display: block; }
    .section-ios .h1-ios, .section-android .h1-android { display: none; }

    body.state-ios    .h1-ios     { display: block; }
    body.state-ios    .h1-default { display: none;  }
    body.state-android .h1-android { display: block; }
    body.state-android .h1-default { display: none;  }

    .redirect-note {
      font-size: .8125rem;
      color: var(--muted);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="logo-wrap" href="/">
      <img src="/images/logo.svg" alt="Obly">
      Obly
    </a>

    <h1>
      <span class="h1-default">Baixar Obly</span>
      <span class="h1-ios" style="display:none">Você está no iOS</span>
      <span class="h1-android" style="display:none">Você está no Android</span>
    </h1>
    <p class="subtitle">Registre sua obra, compartilhe com o cliente. Grátis para começar.</p>

    <!-- iOS -->
    <div class="section-ios">
      <a class="btn-store btn-apple" href="https://apps.apple.com/us/app/obly/id6760023664" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Baixar na App Store
      </a>
      <p class="redirect-note" id="redirect-note" style="display:none">Redirecionando automaticamente…</p>
    </div>

    <!-- Android -->
    <div class="section-android">
      <button class="btn-store btn-google" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 20.5V3.5l13 8.5-13 8.5z" opacity=".7"/><path d="M3.5 3.5 16.5 12 13 14.3 3.5 3.5z"/><path d="M3.5 20.5 13 9.7 16.5 12 3.5 20.5z"/></svg>
        Google Play
        <span class="badge-soon">Em breve</span>
      </button>
      <p class="redirect-note" style="margin-top:.75rem">O Obly chegará ao Android em breve.<br>Fique de olho!</p>
    </div>

    <hr class="divider">

    <!-- PC -->
    <div class="section-pc">
      <p class="pc-note">Escolha a loja para o seu dispositivo:</p>
      <br>
      <a class="btn-store btn-apple" href="https://apps.apple.com/us/app/obly/id6760023664" target="_blank" rel="noopener" style="margin-bottom:.75rem">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        App Store (iOS)
      </a>
      <button class="btn-store btn-google" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 20.5V3.5l13 8.5-13 8.5z" opacity=".7"/><path d="M3.5 3.5 16.5 12 13 14.3 3.5 3.5z"/><path d="M3.5 20.5 13 9.7 16.5 12 3.5 20.5z"/></svg>
        Google Play (Android)
        <span class="badge-soon">Em breve</span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent;
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        document.body.classList.add('state-ios');
        // auto-redirect after 1.2s
        var note = document.getElementById('redirect-note');
        if (note) note.style.display = 'block';
        setTimeout(function () {
          window.location.href = 'https://apps.apple.com/us/app/obly/id6760023664';
        }, 1200);
      } else if (isAndroid) {
        document.body.classList.add('state-android');
      } else {
        document.body.classList.add('state-pc');
      }
    })();
  </script>
</body>
</html>
