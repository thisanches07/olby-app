<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite de Obra — Obly App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #EFF6FF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: block;
      margin: 0 auto 24px;
      object-fit: cover;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-ios {
      background: #111827;
      color: #ffffff;
    }
    .btn-android {
      background: #34A853;
      color: #ffffff;
    }
    .btn-open {
      background: #2563EB;
      color: #ffffff;
    }
    .hint {
      font-size: 13px;
      color: #9CA3AF;
      margin-top: 16px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/logo.png" alt="Obly App" />
    <h1>Você foi convidado!</h1>
    <p>
      Alguém compartilhou uma obra com você no <strong>Obly App</strong>.
      Para aceitar o convite, abra o app e clique no link novamente.
    </p>

    <a id="btn-open" class="btn btn-open hidden" href="#">Abrir no Obly App</a>

    <!-- TODO: substituir <APP_STORE_ID> pelo ID real após publicar na App Store (ex: id123456789) -->
    <a id="btn-ios" class="btn btn-ios hidden"
       href="https://apps.apple.com/app/id_TODO_APP_STORE_ID">
      Baixar na App Store (iOS)
    </a>
    <a id="btn-android" class="btn btn-android hidden"
       href="https://play.google.com/store/apps/details?id=com.tsanc.obraapp">
      Baixar no Google Play (Android)
    </a>

    <p class="hint">O link de convite é válido por 7 dias e pode ser usado uma vez.</p>
  </div>

  <script>
    // Lê o token da URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const deepLink = token ? `obraapp://invite?token=${token}` : "obraapp://";

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    const isAndroid = /Android/.test(ua);

    const btnOpen = document.getElementById("btn-open");
    const btnIOS = document.getElementById("btn-ios");
    const btnAndroid = document.getElementById("btn-android");

    if (isIOS) {
      btnOpen.href = deepLink;
      btnOpen.classList.remove("hidden");
      btnIOS.classList.remove("hidden");
    } else if (isAndroid) {
      btnOpen.href = deepLink;
      btnOpen.classList.remove("hidden");
      btnAndroid.classList.remove("hidden");
    } else {
      btnIOS.classList.remove("hidden");
      btnAndroid.classList.remove("hidden");
    }
  </script>
</body>
</html>
